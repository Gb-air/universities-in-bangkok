
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/leaflet@1.9.4/dist/leaflet.css"/>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Sarabun',system-ui,sans-serif}
#wrap{position:relative;width:100%;height:700px;border-radius:12px;overflow:hidden;border:0.5px solid #ddd}
#map{width:100%;height:100%}
.panel{position:absolute;top:10px;left:10px;z-index:1000;width:230px;display:flex;flex-direction:column;gap:5px;max-height:678px;overflow-y:auto;padding-bottom:4px;scrollbar-width:thin;scrollbar-color:#ddd transparent}
.panel::-webkit-scrollbar{width:3px}.panel::-webkit-scrollbar-thumb{background:#ddd;border-radius:3px}
.pbox{background:rgba(255,255,255,0.97);border:0.5px solid rgba(0,0,0,0.13);border-radius:10px;overflow:hidden;box-shadow:0 1px 4px rgba(0,0,0,0.07);flex-shrink:0}
.phead{display:flex;justify-content:space-between;align-items:center;padding:7px 10px;cursor:pointer;user-select:none}
.phead:hover{background:rgba(0,0,0,0.02)}
.phl{font-size:11px;font-weight:700;color:#444;letter-spacing:.02em}
.chev{font-size:11px;color:#bbb;transition:transform .18s}
.chev.open{transform:rotate(180deg)}
.pbody{padding:6px 10px 8px;border-top:0.5px solid rgba(0,0,0,0.06);display:flex;flex-wrap:wrap;gap:4px}
.pbody.collapsed{display:none}
.fb{font-size:10.5px;padding:3px 8px;border-radius:999px;border:0.5px solid #d0d0d0;background:#f4f4f4;color:#555;cursor:pointer;line-height:1.5;transition:all .12s;white-space:nowrap}
.fb.on{background:#A51828;color:#fff;border-color:#A51828}
/* SEARCH */
.search-wrap{position:relative}
.search-row{display:flex;align-items:center;padding:6px 9px;gap:5px}
.search-input{flex:1;border:none;background:transparent;font-size:12px;color:#222;outline:none}
.search-input::placeholder{color:#bbb}
.search-clear{background:none;border:none;color:#bbb;cursor:pointer;font-size:16px;line-height:1;padding:0;display:none}
.sr-dropdown{position:absolute;top:calc(100% + 2px);left:0;right:0;z-index:3000;background:#fff;border:0.5px solid rgba(0,0,0,0.15);border-radius:10px;box-shadow:0 4px 20px rgba(0,0,0,0.13);max-height:240px;overflow-y:auto;display:none}
.sr-item{padding:8px 11px;font-size:12px;color:#222;cursor:pointer;border-bottom:0.5px solid #f2f2f2;line-height:1.4;transition:background .1s}
.sr-item:last-child{border:none}
.sr-item:hover,.sr-item.active{background:#fdf0f0}
.sr-item-name{font-weight:500}
.sr-item-sub{font-size:10px;color:#999;margin-top:1px;display:flex;gap:6px;flex-wrap:wrap}
.sr-badge{display:inline-block;padding:0 5px;border-radius:3px;font-size:9px;font-weight:600;vertical-align:middle}
.sr-no{padding:10px 11px;font-size:12px;color:#bbb;text-align:center}
/* LEGEND bottom-right */
.legend{position:absolute;bottom:28px;right:10px;z-index:1000;background:rgba(255,255,255,0.97);border:0.5px solid rgba(0,0,0,0.13);border-radius:10px;padding:9px 12px;font-size:11px;color:#555;box-shadow:0 1px 4px rgba(0,0,0,0.07)}
.lr{display:flex;align-items:center;gap:6px;margin:3px 0}
.lc{width:11px;height:11px;border-radius:50%;flex-shrink:0}
.ls{width:11px;height:11px;border-radius:2px;flex-shrink:0}
.lsep{border-top:0.5px solid #eee;margin:5px 0}
/* INFO PANEL */
.info{position:absolute;top:10px;right:10px;z-index:1000;width:232px;background:#fff;border:0.5px solid rgba(0,0,0,0.13);border-radius:12px;display:none;box-shadow:0 2px 14px rgba(0,0,0,0.12);overflow:hidden;max-height:666px;overflow-y:auto}
.info-img{width:100%;height:118px;object-fit:cover;display:block;background:#f0f0f0}
.info-img-ph{width:100%;height:118px;background:linear-gradient(135deg,#f5e6e6,#fcdede);display:flex;align-items:center;justify-content:center;font-size:36px}
.info-body{padding:11px 13px 13px}
.iname{font-size:13px;font-weight:700;color:#111;margin-bottom:2px;line-height:1.35}
.iabbr{font-size:10px;color:#999;margin-bottom:8px}
.irow{display:flex;justify-content:space-between;align-items:flex-start;padding:3.5px 0;border-bottom:0.5px solid #f2f2f2;font-size:11px;gap:6px}
.irow:last-child{border:none}
.ik{color:#aaa;flex-shrink:0}
.iv{color:#222;font-weight:500;text-align:right;line-height:1.3;max-width:148px}
.dpill{display:inline-block;padding:1px 7px;border-radius:999px;font-size:10px;font-weight:600}
.pub-b{background:#e1f5ee;color:#0a6640;padding:1px 7px;border-radius:999px;font-size:10px;font-weight:600}
.prv-b{background:#fef0d8;color:#7a4700;padding:1px 7px;border-radius:999px;font-size:10px;font-weight:600}
.sat-b{background:#e8eaf6;color:#3949ab;padding:1px 7px;border-radius:999px;font-size:10px;font-weight:600}
.info-close{position:absolute;top:8px;right:9px;background:rgba(0,0,0,0.35);border:none;color:#fff;cursor:pointer;font-size:14px;line-height:1;padding:3px 7px;border-radius:999px;z-index:10}
.campus-badge{font-size:9px;padding:1px 6px;border-radius:3px;font-weight:700;margin-left:5px;vertical-align:middle}
.main-badge{background:#e1f5ee;color:#0a6640}
.sat-badge{background:#e8eaf6;color:#3949ab}
.count{position:absolute;bottom:28px;left:50%;transform:translateX(-50%);z-index:1000;background:rgba(255,255,255,0.97);border:0.5px solid rgba(0,0,0,0.13);border-radius:10px;padding:6px 14px;font-size:11px;color:#555;white-space:nowrap;box-shadow:0 1px 4px rgba(0,0,0,0.07)}
</style>

function diffColor(d){return d>=7?'#A51828':d>=4?'#BA7517':'#1D9E75'}
function diffLabel(d){return d>=9?'ยากมาก (9–10)':d>=7?'ยาก (7–8)':d>=5?'ปานกลาง (5–6)':d>=3?'ค่อนข้างง่าย (3–4)':'ระบบเปิด (1–2)'}
function feeLabel(b){return{free:'รัฐบาลสนับสนุน',low:'ต่ำกว่า ฿100K',mid:'฿100K–300K',high:'฿300K–600K',vhigh:'สูงกว่า ฿600K'}[b]||b}

function makeIcon(u,hl){
  const col=diffColor(u.diff);
  const isSat=u.campus==='satellite';
  const sz=u.major?(isSat?14:20):(isSat?10:13);
  const ring=u.major?'#185FA5':'#666';
  const glow=hl?'box-shadow:0 0 0 4px rgba(165,24,40,0.25),0 1px 5px rgba(0,0,0,0.3);':'box-shadow:0 1px 5px rgba(0,0,0,0.35);';
  // satellites get diamond shape via rotation
  const shape=isSat
    ?`border-radius:3px;transform:rotate(45deg);`
    :`border-radius:50%;`;
  return L.divIcon({className:'',html:`<div style="width:${sz}px;height:${sz}px;${shape}background:${col};border:2px solid ${ring};${glow}cursor:pointer"></div>`,iconAnchor:[sz/2,sz/2],iconSize:[sz,sz]});
}

function matches(u){
  if(FILT.type!=='all'&&u.type!==FILT.type)return false;
  if(FILT.cat!=='all'&&u.cat!==FILT.cat)return false;
  if(FILT.size==='major'&&!u.major)return false;
  if(FILT.size==='minor'&&u.major)return false;
  if(FILT.diff==='hard'&&u.diff<7)return false;
  if(FILT.diff==='mid'&&(u.diff<4||u.diff>6))return false;
  if(FILT.diff==='easy'&&u.diff>3)return false;
  if(FILT.fee!=='all'&&u.feeBand!==FILT.fee)return false;
  if(FILT.dist!=='all'&&u.distKey!==FILT.dist)return false;
  if(FILT.foc!=='all'&&!u.focKeys.includes(FILT.foc))return false;
  if(FILT.campus!=='all'&&u.campus!==FILT.campus)return false;
  return true;
}

  const dc=diffColor(u.diff);
  const fc={free:'#185FA5',low:'#1D9E75',mid:'#BA7517',high:'#E24B4A',vhigh:'#7B1FA2'}[u.feeBand]||'#555';
  document.getElementById('iRows').innerHTML=`
    <div class="irow"><span class="ik">ประเภท</span><span class="iv"><span class="${u.type==='public'?'pub-b':'prv-b'}">${u.type==='public'?'รัฐบาล':'เอกชน'}</span></span></div>
    <div class="irow"><span class="ik">หมวดหมู่</span><span class="iv">${CAT_LABEL[u.cat]||u.cat}</span></div>
    <div class="irow"><span class="ik">เขต</span><span class="iv">${u.district}</span></div>
    <div class="irow"><span class="ik">สาขาเด่น</span><span class="iv">${u.focus}</span></div>
    <div class="irow"><span class="ik">ความยาก</span><span class="iv"><span class="dpill" style="background:${dc}18;color:${dc}">${diffLabel(u.diff)}</span></span></div>
    <div class="irow"><span class="ik">ค่าเล่าเรียน</span><span class="iv">${u.fee}</span></div>
    <div class="irow"><span class="ik">ระดับค่าเล่าเรียน</span><span class="iv"><span class="dpill" style="background:${fc}15;color:${fc}">${feeLabel(u.feeBand)}</span></span></div>
  `;
  document.getElementById('infoPanel').style.display='block';
}
window.closeInfo=function(){
  document.getElementById('infoPanel').style.display='none';
  if(highlighted){highlighted.setIcon(makeIcon(highlighted.inst,false));highlighted=null;}
};

function flyTo(u){
  const m=markers.find(x=>x.inst===u);
  if(!m)return;
  if(!map.hasLayer(m))m.addTo(map);
  map.flyTo([u.lat,u.lng],14,{duration:0.8});
  showInfo(u);
  if(highlighted&&highlighted!==m)highlighted.setIcon(makeIcon(highlighted.inst,false));
  highlighted=m;m.setIcon(makeIcon(u,true));
}

function applyFilters(){
  let n=0;
  markers.forEach(m=>{
    if(matches(m.inst)){if(!map.hasLayer(m))m.addTo(map);n++;}
    else if(map.hasLayer(m))map.removeLayer(m);
  });
  document.getElementById('countBadge').textContent=`แสดง ${n} สถาบัน`;
}
window.setF=function(btn){
  const f=btn.dataset.f,v=btn.dataset.v;
  document.querySelectorAll(`.fb[data-f="${f}"]`).forEach(b=>b.classList.remove('on'));
  btn.classList.add('on');FILT[f]=v;applyFilters();
};
window.tp=function(bodyId,chevId){
  document.getElementById(bodyId).classList.toggle('collapsed');
  document.getElementById(chevId).classList.toggle('open');
};

// ── SEARCH with fuzzy approximate matching ──
let srHits=[];
function score(u,q){
  const n=u.name.toLowerCase(),en=u.nameEn.toLowerCase(),ab=u.abbr.toLowerCase(),d=u.district,f=u.focus;
  if(ab===q)return 100;
  if(n.includes(q)||en.includes(q))return 90;
  if(ab.startsWith(q))return 80;
  if(d.includes(q))return 70;
  if(f.toLowerCase().includes(q))return 60;
  // character overlap for approximate
  let overlap=0;for(const c of q){if(n.includes(c)||en.includes(c))overlap++;}
  return Math.floor((overlap/q.length)*50);
}
function renderSR(hits,q){
  const dr=document.getElementById('srDropdown');
  if(!hits.length){dr.innerHTML='<div class="sr-no">ไม่พบผลลัพธ์</div>';dr.style.display='block';return;}
  dr.innerHTML=hits.map((u,i)=>{
    const typeC=u.type==='public'?'#0a6640':'#7a4700';
    const typeBg=u.type==='public'?'#e1f5ee':'#fef0d8';
    const satLabel=u.campus==='satellite'?' <span style="color:#3949ab;font-size:9px">(สาขา)</span>':'';
    return `<div class="sr-item${i===srIdx?' active':''}" onmousedown="pickSR(${INSTS.indexOf(u)})">
      <div class="sr-item-name">${u.name}${satLabel}</div>
      <div class="sr-item-sub">
        <span class="sr-badge" style="background:${typeBg};color:${typeC}">${u.type==='public'?'รัฐ':'เอกชน'}</span>
        <span>${u.abbr}</span>
        <span>${u.district}</span>
        <span>${CAT_LABEL[u.cat]||u.cat}</span>
      </div>
    </div>`;
  }).join('');
  dr.style.display='block';
}
window.onSearch=function(){
  const raw=document.getElementById('searchInput').value;
  const q=raw.trim().toLowerCase();
  document.getElementById('searchClear').style.display=raw?'block':'none';
  srIdx=-1;
  const dr=document.getElementById('srDropdown');
  if(!q){dr.style.display='none';srHits=[];return;}
  srHits=INSTS.map(u=>({u,s:score(u,q)})).filter(x=>x.s>20).sort((a,b)=>b.s-a.s).map(x=>x.u).slice(0,10);
  renderSR(srHits,q);
};
window.onKey=function(e){
  const dr=document.getElementById('srDropdown');
  if(dr.style.display==='none'||!srHits.length)return;
  if(e.key==='ArrowDown'){srIdx=Math.min(srIdx+1,srHits.length-1);renderSR(srHits,'');}
  else if(e.key==='ArrowUp'){srIdx=Math.max(srIdx-1,-1);renderSR(srHits,'');}
  else if(e.key==='Enter'&&srIdx>=0){pickSR(INSTS.indexOf(srHits[srIdx]));}
  else if(e.key==='Escape'){dr.style.display='none';}
};
window.pickSR=function(idx){
  const u=INSTS[idx];
  document.getElementById('searchInput').value=u.name;
  document.getElementById('searchClear').style.display='block';
  document.getElementById('srDropdown').style.display='none';
  srHits=[];srIdx=-1;
  flyTo(u);
};
window.clearSearch=function(){
  document.getElementById('searchInput').value='';
  document.getElementById('searchClear').style.display='none';
  document.getElementById('srDropdown').style.display='none';
  srHits=[];srIdx=-1;
};
document.addEventListener('click',e=>{
  if(!e.target.closest('.search-wrap'))
    document.getElementById('srDropdown').style.display='none';
});

function initMap(){
  map=L.map('map',{zoomControl:true,attributionControl:true}).setView([13.756,100.540],11);
  L.tileLayer('https://{s}.basemaps.cartocdn.com/light_nolabels/{z}/{x}/{y}{r}.png',{
    attribution:'&copy; <a href="https://www.openstreetmap.org/copyright">OSM</a> &copy; <a href="https://carto.com/">CARTO</a>',
    subdomains:'abcd',maxZoom:19
  }).addTo(map);
  fetch('https://cdn.jsdelivr.net/gh/pcrete/gsvloader-demo@master/geojson/Bangkok-districts.geojson')
    .then(r=>r.json()).then(gj=>{
      L.geoJSON(gj,{
        style:{fillColor:'#185FA5',fillOpacity:0.06,color:'#185FA5',weight:1.5,opacity:0.5},
        onEachFeature:(f,layer)=>{
          const n=f.properties.dname_e||f.properties.DNAME_E||f.properties.name||'';
          if(n)layer.bindTooltip(n,{permanent:false,direction:'center',opacity:0.85});
        }
      }).addTo(map);
      L.tileLayer('https://{s}.basemaps.cartocdn.com/light_only_labels/{z}/{x}/{y}{r}.png',{subdomains:'abcd',maxZoom:19}).addTo(map);
    }).catch(()=>{
      L.tileLayer('https://{s}.basemaps.cartocdn.com/light_all/{z}/{x}/{y}{r}.png',{attribution:'&copy; OSM &copy; CARTO',subdomains:'abcd',maxZoom:19}).addTo(map);
    });
  INSTS.forEach(u=>{
    const m=L.marker([u.lat,u.lng],{icon:makeIcon(u,false),zIndexOffset:u.major?(u.campus==='main'?1000:500):0});
    m.inst=u;
    m.on('click',()=>{
      if(highlighted&&highlighted!==m)highlighted.setIcon(makeIcon(highlighted.inst,false));
      highlighted=m;m.setIcon(makeIcon(u,true));showInfo(u);
    });
    markers.push(m);m.addTo(map);
  });
  document.getElementById('countBadge').textContent=`แสดง ${INSTS.length} สถาบัน`;
}
initMap();
</script>
