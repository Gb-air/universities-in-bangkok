
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/leaflet@1.9.4/dist/leaflet.css"/>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Sarabun',system-ui,sans-serif;font-size:13px}
#wrap{position:relative;width:100%;height:700px;border-radius:12px;overflow:hidden;border:0.5px solid #ddd}
#map{width:100%;height:100%}

/* LEFT PANEL */
.panel{position:absolute;top:10px;left:10px;z-index:1000;width:228px;display:flex;flex-direction:column;gap:5px;max-height:678px;overflow-y:auto;padding-bottom:4px;scrollbar-width:thin;scrollbar-color:#ddd transparent}
.panel::-webkit-scrollbar{width:3px}.panel::-webkit-scrollbar-thumb{background:#ddd;border-radius:3px}
.pbox{background:rgba(255,255,255,0.97);border:0.5px solid rgba(0,0,0,0.13);border-radius:10px;overflow:visible;box-shadow:0 1px 4px rgba(0,0,0,0.07);flex-shrink:0}
.phead{display:flex;justify-content:space-between;align-items:center;padding:7px 10px;cursor:pointer;user-select:none;border-radius:10px}
.phead:hover{background:rgba(0,0,0,0.02)}
.phl{font-size:11px;font-weight:700;color:#444;letter-spacing:.02em}
.chev{font-size:11px;color:#bbb;transition:transform .18s}
.chev.open{transform:rotate(180deg)}
.pbody{padding:6px 10px 8px;border-top:0.5px solid rgba(0,0,0,0.06);display:flex;flex-wrap:wrap;gap:4px;border-radius:0 0 10px 10px;overflow:hidden}
.pbody.collapsed{display:none}
.fb{font-size:10.5px;padding:3px 8px;border-radius:999px;border:0.5px solid #d0d0d0;background:#f4f4f4;color:#555;cursor:pointer;line-height:1.5;transition:all .12s;white-space:nowrap}
.fb.on{background:#A51828;color:#fff;border-color:#A51828}

/* SEARCH */
.search-outer{position:relative;background:rgba(255,255,255,0.97);border:0.5px solid rgba(0,0,0,0.13);border-radius:10px;box-shadow:0 1px 4px rgba(0,0,0,0.07)}
.search-row{display:flex;align-items:center;padding:6px 9px;gap:5px}
.search-input{flex:1;border:none;background:transparent;font-size:12px;color:#222;outline:none;font-family:inherit}
.search-input::placeholder{color:#bbb}
.search-clear{background:none;border:none;color:#bbb;cursor:pointer;font-size:16px;line-height:1;padding:0;display:none}
.sr-drop{position:absolute;top:calc(100% + 3px);left:0;right:0;z-index:9999;background:#fff;border:0.5px solid rgba(0,0,0,0.15);border-radius:10px;box-shadow:0 6px 24px rgba(0,0,0,0.14);max-height:250px;overflow-y:auto;display:none}
.sr-item{padding:8px 11px;cursor:pointer;border-bottom:0.5px solid #f2f2f2;transition:background .1s}
.sr-item:last-child{border:none}
.sr-item:hover,.sr-item.hi{background:#fdf5f5}
.sr-name{font-size:12px;font-weight:600;color:#222;line-height:1.3}
.sr-meta{display:flex;gap:5px;flex-wrap:wrap;margin-top:2px}
.sr-tag{font-size:9px;padding:1px 5px;border-radius:3px;font-weight:600}
.sr-no{padding:12px;text-align:center;font-size:12px;color:#bbb}

/* LANG TOGGLE */
.lang-btn{position:absolute;top:10px;right:52px;z-index:1000;background:rgba(255,255,255,0.97);border:0.5px solid rgba(0,0,0,0.13);border-radius:8px;padding:5px 10px;font-size:11px;font-weight:700;cursor:pointer;box-shadow:0 1px 4px rgba(0,0,0,0.07);color:#444;transition:all .15s}
.lang-btn:hover{background:#f5f5f5}

/* INFO PANEL */
.info{position:absolute;top:10px;right:10px;z-index:1000;width:235px;background:#fff;border:0.5px solid rgba(0,0,0,0.13);border-radius:12px;display:none;box-shadow:0 2px 14px rgba(0,0,0,0.12);overflow:hidden;max-height:672px;overflow-y:auto}
.info-close{position:absolute;top:8px;right:8px;background:rgba(0,0,0,0.4);border:none;color:#fff;cursor:pointer;font-size:13px;padding:3px 7px;border-radius:999px;z-index:10;line-height:1}

/* IMAGE SLIDER */
.slider-wrap{position:relative;width:100%;height:130px;overflow:hidden;background:#eee}
.slider-img{width:100%;height:130px;object-fit:cover;display:block;position:absolute;top:0;left:0;opacity:0;transition:opacity .35s}
.slider-img.active{opacity:1}
.slider-ph{width:100%;height:130px;background:linear-gradient(135deg,#f5e6e6,#fce4e4);display:flex;align-items:center;justify-content:center;font-size:40px}
.sl-prev,.sl-next{position:absolute;top:50%;transform:translateY(-50%);background:rgba(0,0,0,0.35);border:none;color:#fff;font-size:16px;padding:4px 8px;cursor:pointer;border-radius:4px;z-index:5;line-height:1}
.sl-prev{left:4px}.sl-next{right:4px}
.sl-dots{position:absolute;bottom:5px;left:50%;transform:translateX(-50%);display:flex;gap:4px;z-index:5}
.sl-dot{width:6px;height:6px;border-radius:50%;background:rgba(255,255,255,0.55);cursor:pointer;transition:background .2s}
.sl-dot.on{background:#fff}

.info-body{padding:10px 13px 12px}
.iname{font-size:13px;font-weight:700;color:#111;margin-bottom:2px;line-height:1.35}
.iabbr{font-size:10px;color:#999;margin-bottom:8px}
.irow{display:flex;justify-content:space-between;align-items:flex-start;padding:3.5px 0;border-bottom:0.5px solid #f2f2f2;font-size:11px;gap:6px}
.irow:last-child{border:none}
.ik{color:#aaa;flex-shrink:0}
.iv{color:#222;font-weight:500;text-align:right;line-height:1.3;max-width:148px}
.dpill{display:inline-block;padding:1px 7px;border-radius:999px;font-size:10px;font-weight:600}
.pub-b{background:#e1f5ee;color:#0a6640;padding:1px 7px;border-radius:999px;font-size:10px;font-weight:600}
.prv-b{background:#fef0d8;color:#7a4700;padding:1px 7px;border-radius:999px;font-size:10px;font-weight:600}
.cbadge{font-size:9px;padding:1px 6px;border-radius:3px;font-weight:700;margin-left:4px;vertical-align:middle}
.cb-main{background:#e1f5ee;color:#0a6640}
.cb-sat{background:#e8eaf6;color:#3949ab}

/* LEGEND */
.legend{position:absolute;bottom:28px;right:10px;z-index:1000;background:rgba(255,255,255,0.97);border:0.5px solid rgba(0,0,0,0.13);border-radius:10px;padding:9px 12px;font-size:11px;color:#555;box-shadow:0 1px 4px rgba(0,0,0,0.07)}
.lr{display:flex;align-items:center;gap:6px;margin:3px 0}
.lc{width:11px;height:11px;border-radius:50%;flex-shrink:0}
.ls{width:11px;height:11px;border-radius:2px;flex-shrink:0}
.lsep{border-top:0.5px solid #eee;margin:5px 0}
.ldia{width:9px;height:9px;border-radius:2px;flex-shrink:0;transform:rotate(45deg)}

/* COUNT */
.count{position:absolute;bottom:28px;left:50%;transform:translateX(-50%);z-index:1000;background:rgba(255,255,255,0.97);border:0.5px solid rgba(0,0,0,0.13);border-radius:10px;padding:6px 14px;font-size:11px;color:#555;white-space:nowrap;box-shadow:0 1px 4px rgba(0,0,0,0.07)}
</style>

// ── SLIDER ──
let sliderState={imgs:[],cur:0,timers:[]};
function buildSlider(imgKey,fallbackEmoji){
  const imgs=IMGS[imgKey]||[];
  sliderState={imgs,cur:0,timers:[]};
  const wrap=document.getElementById('sliderWrap');
  if(!imgs.length){wrap.innerHTML=`<div class="slider-ph">${fallbackEmoji}</div>`;return;}
  let html=imgs.map((src,i)=>`<img class="slider-img${i===0?' active':''}" src="${src}" alt="campus ${i+1}" onerror="this.style.display='none'">`).join('');
  if(imgs.length>1){
    html+=`<button class="sl-prev" onclick="slideBy(-1)">‹</button><button class="sl-next" onclick="slideBy(1)">›</button>`;
    html+=`<div class="sl-dots">${imgs.map((_,i)=>`<div class="sl-dot${i===0?' on':''}" onclick="slideTo(${i})"></div>`).join('')}</div>`;
  }
  wrap.innerHTML=html;
}
window.slideBy=function(d){slideTo((sliderState.cur+d+sliderState.imgs.length)%sliderState.imgs.length)};
window.slideTo=function(i){
  const imgs=document.querySelectorAll('.slider-img');
  const dots=document.querySelectorAll('.sl-dot');
  if(!imgs.length)return;
  imgs[sliderState.cur].classList.remove('active');
  if(dots.length)dots[sliderState.cur].classList.remove('on');
  sliderState.cur=i;
  imgs[i].classList.add('active');
  if(dots.length)dots[i].classList.add('on');
};

// ── INFO ──
const FILT={type:'all',cat:'all',diff:'all',size:'all',fee:'all',dist:'all',foc:'all',campus:'all'};
let map,markers=[],highlighted=null;
window._lastU=null;

function diffColor(d){return d>=7?'#A51828':d>=4?'#BA7517':'#1D9E75'}
function makeIcon(u,hl){
  const col=diffColor(u.diff),isSat=u.campus==='satellite';
  const sz=u.major?(isSat?14:20):(isSat?10:13);
  const ring=u.major?'#185FA5':'#666';
  const glow=hl?'box-shadow:0 0 0 4px rgba(165,24,40,0.25),0 1px 5px rgba(0,0,0,0.3);':'box-shadow:0 1px 5px rgba(0,0,0,0.35);';
  const shape=isSat?'border-radius:3px;transform:rotate(45deg);':'border-radius:50%;';
  return L.divIcon({className:'',html:`<div style="width:${sz}px;height:${sz}px;${shape}background:${col};border:2px solid ${ring};${glow}cursor:pointer"></div>`,iconAnchor:[sz/2,sz/2],iconSize:[sz,sz]});
}

function showInfo(u){
  window._lastU=u;
  buildSlider(u.imgKey, EMOJI[u.abbr]||'🎓');
  document.getElementById('iName').innerHTML=u.name+`<span class="cbadge ${u.campus==='satellite'?'cb-sat':'cb-main'}">${t(u.campus==='satellite'?'sat':'main')}</span>`;
  document.getElementById('iAbbr').textContent=`${u.abbr} · ${u.nameEn}`;
  const dc=diffColor(u.diff);
  const fc={free:'#185FA5',low:'#1D9E75',mid:'#BA7517',high:'#E24B4A',vhigh:'#7B1FA2'}[u.feeBand]||'#555';
  document.getElementById('iRows').innerHTML=`
    <div class="irow"><span class="ik">${t('rowType')}</span><span class="iv"><span class="${u.type==='public'?'pub-b':'prv-b'}">${t(u.type==='public'?'pub':'prv')}</span></span></div>
    <div class="irow"><span class="ik">${t('rowCat')}</span><span class="iv">${catLabelFn(u.cat)}</span></div>
    <div class="irow"><span class="ik">${t('rowDist')}</span><span class="iv">${u.district}</span></div>
    <div class="irow"><span class="ik">${t('rowFocus')}</span><span class="iv">${u.focus[LANG]||u.focus.th}</span></div>
    <div class="irow"><span class="ik">${t('rowDiff')}</span><span class="iv"><span class="dpill" style="background:${dc}18;color:${dc}">${diffLabelFn(u.diff)}</span></span></div>
    <div class="irow"><span class="ik">${t('rowFee')}</span><span class="iv">${u.fee}</span></div>
    <div class="irow"><span class="ik">${t('rowFeeLvl')}</span><span class="iv"><span class="dpill" style="background:${fc}15;color:${fc}">${feeLabelFn(u.feeBand)}</span></span></div>
  `;
  document.getElementById('infoPanel').style.display='block';
}
window.closeInfo=function(){
  document.getElementById('infoPanel').style.display='none';
  if(highlighted){highlighted.setIcon(makeIcon(highlighted.inst,false));highlighted=null;}
};

function flyTo(u){
  const m=markers.find(x=>x.inst===u);
  if(!m){map.flyTo([u.lat,u.lng],14,{duration:0.8});showInfo(u);return;}
  if(!map.hasLayer(m))m.addTo(map);
  map.flyTo([u.lat,u.lng],14,{duration:0.8});
  showInfo(u);
  if(highlighted&&highlighted!==m)highlighted.setIcon(makeIcon(highlighted.inst,false));
  highlighted=m;m.setIcon(makeIcon(u,true));
}

function applyFilters(){
  let n=0;
  markers.forEach(m=>{
    if(matchesU(m.inst)){if(!map.hasLayer(m))m.addTo(map);n++;}
    else if(map.hasLayer(m))map.removeLayer(m);
  });
  const lbl=LANG==='th'?`แสดง ${n} สถาบัน`:`${n} institutions shown`;
  document.getElementById('countBadge').textContent=lbl;
}
function matchesU(u){
  if(FILT.type!=='all'&&u.type!==FILT.type)return false;
  if(FILT.cat!=='all'&&u.cat!==FILT.cat)return false;
  if(FILT.size==='major'&&!u.major)return false;
  if(FILT.size==='minor'&&u.major)return false;
  if(FILT.diff==='hard'&&u.diff<7)return false;
  if(FILT.diff==='mid'&&(u.diff<4||u.diff>6))return false;
  if(FILT.diff==='easy'&&u.diff>3)return false;
  if(FILT.fee!=='all'&&u.feeBand!==FILT.fee)return false;
  if(FILT.dist!=='all'&&u.distKey!==FILT.dist)return false;
  if(FILT.foc!=='all'&&!u.focKeys.includes(FILT.foc))return false;
  if(FILT.campus!=='all'&&u.campus!==FILT.campus)return false;
  return true;
}
window.setF=function(btn){
  const f=btn.dataset.f,v=btn.dataset.v;
  document.querySelectorAll(`.fb[data-f="${f}"]`).forEach(b=>b.classList.remove('on'));
  btn.classList.add('on');FILT[f]=v;applyFilters();
};
window.tp=function(bodyId,chevId){
  document.getElementById(bodyId).classList.toggle('collapsed');
  document.getElementById(chevId).classList.toggle('open');
};

// ── SEARCH (fuzzy, fast) ──
let srHits=[],srIdx=-1;
function scoreU(u,q){
  const n=u.name,en=u.nameEn.toLowerCase(),ab=u.abbr.toLowerCase(),d=u.district,f=u.focus.th+' '+u.focus.en;
  if(ab===q)return 100;
  if(n.includes(q)||en.includes(q))return 90;
  if(ab.startsWith(q)||ab.includes(q))return 80;
  if(d.includes(q))return 70;
  if(f.toLowerCase().includes(q))return 60;
  let ov=0;for(const c of q)if(n.includes(c)||en.includes(c)||ab.includes(c))ov++;
  return Math.round((ov/q.length)*45);
}
function renderSRDropdown(){
  const dr=document.getElementById('srd');
  if(!srHits.length){
    dr.innerHTML=`<div class="sr-no">${t('noResult')}</div>`;
    dr.style.display='block';return;
  }
  dr.innerHTML=srHits.map((u,i)=>{
    const tc=u.type==='public'?'#0a6640':'#7a4700';
    const tb=u.type==='public'?'#e1f5ee':'#fef0d8';
    const satTag=u.campus==='satellite'?`<span class="sr-tag" style="background:#e8eaf6;color:#3949ab">${t('sat')}</span>`:'';
    return `<div class="sr-item${i===srIdx?' hi':''}" onmousedown="pickSR(${INSTS.indexOf(u)})">
      <div class="sr-name">${LANG==='th'?u.name:u.nameEn}</div>
      <div class="sr-meta">
        <span class="sr-tag" style="background:${tb};color:${tc}">${t(u.type==='public'?'pub':'prv')}</span>
        ${satTag}
        <span class="sr-tag" style="background:#f4f4f4;color:#555">${u.abbr}</span>
        <span class="sr-tag" style="background:#f4f4f4;color:#555">${u.district}</span>
      </div>
    </div>`;
  }).join('');
  dr.style.display='block';
}
window.doSearch=function(){
  const raw=document.getElementById('si').value;
  const q=raw.trim().toLowerCase();
  document.getElementById('sc').style.display=raw?'block':'none';
  const dr=document.getElementById('srd');
  srIdx=-1;
  if(!q){dr.style.display='none';srHits=[];return;}
  srHits=INSTS.map(u=>({u,s:scoreU(u,q)})).filter(x=>x.s>20).sort((a,b)=>b.s-a.s).slice(0,10).map(x=>x.u);
  renderSRDropdown();
};
window.onKey=function(e){
  const dr=document.getElementById('srd');
  if(dr.style.display==='none'||!srHits.length)return;
  if(e.key==='ArrowDown'){e.preventDefault();srIdx=Math.min(srIdx+1,srHits.length-1);renderSRDropdown();}
  else if(e.key==='ArrowUp'){e.preventDefault();srIdx=Math.max(srIdx-1,-1);renderSRDropdown();}
  else if(e.key==='Enter'){e.preventDefault();if(srIdx>=0)pickSR(INSTS.indexOf(srHits[srIdx]));else if(srHits.length)pickSR(INSTS.indexOf(srHits[0]));}
  else if(e.key==='Escape'){dr.style.display='none';}
};
window.pickSR=function(idx){
  const u=INSTS[idx];
  document.getElementById('si').value=LANG==='th'?u.name:u.nameEn;
  document.getElementById('sc').style.display='block';
  document.getElementById('srd').style.display='none';
  srHits=[];srIdx=-1;
  flyTo(u);
};
window.clrSearch=function(){
  document.getElementById('si').value='';
  document.getElementById('sc').style.display='none';
  document.getElementById('srd').style.display='none';
  srHits=[];srIdx=-1;
};
document.addEventListener('click',e=>{
  if(!e.target.closest('.search-outer'))document.getElementById('srd').style.display='none';
});

function initMap(){
  map=L.map('map',{zoomControl:true,attributionControl:true}).setView([13.756,100.540],11);
  L.tileLayer('https://{s}.basemaps.cartocdn.com/light_nolabels/{z}/{x}/{y}{r}.png',{
    attribution:'&copy; <a href="https://www.openstreetmap.org/copyright">OSM</a> &copy; <a href="https://carto.com/">CARTO</a>',
    subdomains:'abcd',maxZoom:19
  }).addTo(map);
  fetch('https://cdn.jsdelivr.net/gh/pcrete/gsvloader-demo@master/geojson/Bangkok-districts.geojson')
    .then(r=>r.json()).then(gj=>{
      L.geoJSON(gj,{
        style:{fillColor:'#185FA5',fillOpacity:0.06,color:'#185FA5',weight:1.5,opacity:0.5},
        onEachFeature:(f,layer)=>{
          const n=f.properties.dname_e||f.properties.DNAME_E||f.properties.name||'';
          if(n)layer.bindTooltip(n,{permanent:false,direction:'center',opacity:0.85});
        }
      }).addTo(map);
      L.tileLayer('https://{s}.basemaps.cartocdn.com/light_only_labels/{z}/{x}/{y}{r}.png',{subdomains:'abcd',maxZoom:19}).addTo(map);
    }).catch(()=>{
      L.tileLayer('https://{s}.basemaps.cartocdn.com/light_all/{z}/{x}/{y}{r}.png',{attribution:'&copy; OSM &copy; CARTO',subdomains:'abcd',maxZoom:19}).addTo(map);
    });
  INSTS.forEach(u=>{
    const m=L.marker([u.lat,u.lng],{icon:makeIcon(u,false),zIndexOffset:u.major?(u.campus==='main'?1000:500):100});
    m.inst=u;
    m.on('click',()=>{
      if(highlighted&&highlighted!==m)highlighted.setIcon(makeIcon(highlighted.inst,false));
      highlighted=m;m.setIcon(makeIcon(u,true));showInfo(u);
    });
    markers.push(m);m.addTo(map);
  });
  document.getElementById('countBadge').textContent=`แสดง ${INSTS.length} สถาบัน`;
}
initMap();
</script>
